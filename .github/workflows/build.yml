name: manual build

on: 
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure cmake
        run: cmake -S . -B build

      - name: build
        run: cmake --build build

      - name: Run program
        run: cd build && dir

      - name: Dir List
        run: dir
